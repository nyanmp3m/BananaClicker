<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Кликер с рекламой и правой лентой</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #f0f0f0;
    display: flex;
    height: 100vh;
    position: relative;
  }

  /* Центр - окно для клика */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #e0e0e0;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    max-width: calc(100% - 160px);
    border-radius: 10px;
    position: relative;
    z-index: 1;
  }

  /* Правый край - фиксированная лента */
  .right-strap {
    position: fixed;
    top: 0;
    right: 0;
    width: 160px; /* ширина ленты */
    height: 100vh; /* полная высота */
    background-color: rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0px 0;
    overflow-y: auto; /* при необходимости прокрутка */
    z-index: 2; /* чтобы было поверх других элементов */
  }

  /* Пример содержимого правой ленты */
  .right-strap img {
    width: 160px;
    height: auto;
    margin: 1px 0;
  }


  /* Заголовок */
  .center h1 {
    margin-bottom: 20px;
    font-size: 24px;
    color: #333;
  }

  /* Кнопка клика */
  .click-btn {
    font-size: 20px;
    padding: 15px 30px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .click-btn:hover {
    background-color: #45a049;
  }

  /* Результат/счёт */
  #score {
    margin-top: 15px;
    font-size: 18px;
    color: #222;
  }

  /* Кнопка logout */
  .logout-form {
    margin-top: 20px;
  }

  .logout-form button {
    padding: 10px 20px;
    background-color: #d9534f;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }
  .logout-form button:hover {
    background-color: #c9302c;
  }

  /* Гифки по бокам */
  .gif {
    width: 80px;
    height: 80px;
    object-fit: cover;
  }

  /* Адаптивность */
  @media(max-width: 600px) {
    body {
      flex-direction: column;
    }
    .side {
      width: 80px;
    }
    .center {
      max-width: 90%;
    }
    .right-strap {
      width: 60px;
    }
  }
</style>
</head>
<body>

<div class="center">
  <h1>Кликер</h1>
  <button class="click-btn" id="clickBtn">Кликни меня!</button>
  <div id="score">Счёт: 0</div>
  <!-- Форма logout -->
  <form action="{{ url_for('logout') }}" method="post" class="logout-form">
    <button type="submit">Logout</button>
  </form>
</div>

<!-- Правая лента -->

  <!-- Можно добавить больше элементов -->
</div>

<script>
  let count = 0;
  const btn = document.getElementById('clickBtn');
  const scoreDiv = document.getElementById('score');

  btn.addEventListener('click', () => {
    count++;
    scoreDiv.textContent = 'Счёт: ' + count;
  });
</script>

</html>

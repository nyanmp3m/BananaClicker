<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/login_style.css">
    <title>Login Page</title>
</head>

<body>

    <div class="container {% if form_type == 'register' %} active {% endif %}" id="container">
        <div class="form-container sign-up">
            <form action="{{ url_for('register') }}" method="POST">
                <h1>Create Account</h1>
                <div class="social-icons">
                    <a href="https://i.pinimg.com/736x/f9/b6/90/f9b690066ac852581616ae919457f869.jpg" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="https://i.pinimg.com/736x/09/a4/ab/09a4abd130eb1c3651858534ecbe4af9.jpg" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://i.pinimg.com/736x/ab/f2/57/abf257dd70bb378fa48e637ec063ac17.jpg" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="https://i.pinimg.com/736x/60/bf/f1/60bff1c543d93a8abde7ab1e0bde0c79.jpg" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registeration</span>
                <input type="text" name="name" placeholder="{{ name_register }}" required>
                <input type="email" name="email" placeholder="{{ email_register }}" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form action="{{ url_for('login') }}" method="POST">
                <h1>Sign In</h1>
                <div class="social-icons">
                    <a href="https://i.pinimg.com/1200x/77/45/56/774556d2ac02ae018e11ec33b692cba4.jpg" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="https://i.pinimg.com/736x/a4/8c/6d/a48c6d7700d8e65e7596e1b94dec919b.jpg" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://i.pinimg.com/736x/ac/3b/f4/ac3bf4251728908496b11ad73e9b859a.jpg" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="https://i.pinimg.com/736x/4f/ba/50/4fba500e743576c03930bb78c8f0e578.jpg" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email password</span>
                <input type="email" name="email" placeholder ="{{ email_login }}">
                <input type="password" name="password" placeholder="Password">
                <a href="https://cs14.pikabu.ru/post_img/2022/03/06/4/1646542974245734534.jpg">Forget Your Password?</a>
                <button>Sign In</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/login_script.js"></script>
</body>

</html>
